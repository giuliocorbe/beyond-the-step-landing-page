<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1920" height="1080" fill="#000000"/>
  
  <!-- Red accent elements -->
  <rect x="0" y="0" width="1920" height="200" fill="#DC2626" opacity="0.9"/>
  <rect x="0" y="880" width="1920" height="200" fill="#DC2626" opacity="0.9"/>
  
  <!-- Dance silhouette -->
  <g transform="translate(960, 540)">
    <!-- Abstract dancer figure -->
    <circle cx="0" cy="-200" r="40" fill="#FFFFFF"/>
    <rect x="-15" y="-160" width="30" height="120" fill="#FFFFFF" rx="15"/>
    <!-- Arms -->
    <rect x="-120" y="-140" width="100" height="20" fill="#FFFFFF" rx="10" transform="rotate(-30 -70 -130)"/>
    <rect x="20" y="-140" width="100" height="20" fill="#FFFFFF" rx="10" transform="rotate(30 70 -130)"/>
    <!-- Legs -->
    <rect x="-20" y="-40" width="18" height="150" fill="#FFFFFF" rx="9" transform="rotate(-15 -11 35)"/>
    <rect x="2" y="-40" width="18" height="150" fill="#FFFFFF" rx="9" transform="rotate(15 11 35)"/>
  </g>
  
  <!-- Text overlay -->
  <text x="960" y="900" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#FFFFFF" text-anchor="middle">BEYOND THE STEP</text>
  <text x="960" y="950" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" text-anchor="middle" opacity="0.8">Scuola di Danza</text>
</svg>
