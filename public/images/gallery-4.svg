<svg width="1600" height="800" viewBox="0 0 1600 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1600" height="800" fill="#000000"/>
  
  <!-- Red diagonal stripes -->
  <path d="M 0,0 L 400,0 L 0,400 Z" fill="#DC2626"/>
  <path d="M 1600,800 L 1200,800 L 1600,400 Z" fill="#DC2626"/>
  <path d="M 0,800 L 400,800 L 0,400 Z" fill="#DC2626"/>
  <path d="M 1600,0 L 1200,0 L 1600,400 Z" fill="#DC2626"/>
  
  <!-- White center area -->
  <rect x="400" y="200" width="800" height="400" fill="#FFFFFF"/>
  
  <!-- Multiple dancer silhouettes -->
  <g transform="translate(600, 400)">
    <circle cx="0" cy="-80" r="20" fill="#000000"/>
    <rect x="-8" y="-60" width="16" height="60" fill="#000000" rx="8"/>
    <path d="M -8,0 Q -30,30 -50,60" stroke="#000000" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M 8,0 Q 30,30 50,60" stroke="#000000" stroke-width="8" fill="none" stroke-linecap="round"/>
    <rect x="-6" y="0" width="5" height="60" fill="#000000" rx="2"/>
    <rect x="1" y="0" width="5" height="60" fill="#000000" rx="2"/>
  </g>
  
  <g transform="translate(800, 400)">
    <circle cx="0" cy="-80" r="20" fill="#000000"/>
    <rect x="-8" y="-60" width="16" height="60" fill="#000000" rx="8"/>
    <path d="M -8,0 Q -40,20 -70,40" stroke="#000000" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M 8,0 Q 40,20 70,40" stroke="#000000" stroke-width="8" fill="none" stroke-linecap="round"/>
    <rect x="-6" y="0" width="5" height="60" fill="#000000" rx="2"/>
    <rect x="1" y="0" width="5" height="60" fill="#000000" rx="2"/>
  </g>
  
  <g transform="translate(1000, 400)">
    <circle cx="0" cy="-80" r="20" fill="#000000"/>
    <rect x="-8" y="-60" width="16" height="60" fill="#000000" rx="8"/>
    <path d="M -8,0 Q -35,40 -60,80" stroke="#000000" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M 8,0 Q 35,40 60,80" stroke="#000000" stroke-width="8" fill="none" stroke-linecap="round"/>
    <rect x="-6" y="0" width="5" height="60" fill="#000000" rx="2"/>
    <rect x="1" y="0" width="5" height="60" fill="#000000" rx="2"/>
  </g>
  
  <!-- Text -->
  <text x="800" y="450" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#DC2626" text-anchor="middle">BEYOND</text>
  <text x="800" y="490" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#DC2626" text-anchor="middle">THE STEP</text>
</svg>
