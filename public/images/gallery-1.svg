<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="800" fill="#FFFFFF"/>
  
  <!-- Red geometric pattern -->
  <rect x="0" y="0" width="800" height="100" fill="#DC2626"/>
  <rect x="0" y="700" width="800" height="100" fill="#DC2626"/>
  
  <!-- Abstract dance poses -->
  <g transform="translate(400, 400)">
    <!-- Central dancer silhouette -->
    <ellipse cx="0" cy="-100" rx="35" ry="40" fill="#000000"/>
    <path d="M -20,-60 Q -30,0 -40,80 L -20,80 L -10,-60 Z" fill="#000000"/>
    <path d="M 20,-60 Q 30,0 40,80 L 20,80 L 10,-60 Z" fill="#000000"/>
    <!-- Arms in dance position -->
    <path d="M -15,-40 Q -80,-60 -120,-20" stroke="#000000" stroke-width="15" fill="none" stroke-linecap="round"/>
    <path d="M 15,-40 Q 80,-60 120,-20" stroke="#000000" stroke-width="15" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="30" fill="#DC2626" opacity="0.6"/>
  <circle cx="700" cy="100" r="30" fill="#DC2626" opacity="0.6"/>
  <circle cx="100" cy="700" r="30" fill="#DC2626" opacity="0.6"/>
  <circle cx="700" cy="700" r="30" fill="#DC2626" opacity="0.6"/>
</svg>
