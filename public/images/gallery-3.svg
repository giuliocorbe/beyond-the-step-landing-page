<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Split background -->
  <rect x="0" y="0" width="400" height="800" fill="#DC2626"/>
  <rect x="400" y="0" width="400" height="800" fill="#FFFFFF"/>
  
  <!-- Black dancer silhouettes -->
  <g transform="translate(200, 400)">
    <circle cx="0" cy="-150" r="30" fill="#000000"/>
    <rect x="-12" y="-120" width="24" height="100" fill="#000000" rx="12"/>
    <path d="M -12,-20 Q -50,20 -80,60" stroke="#000000" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M 12,-20 Q 50,20 80,60" stroke="#000000" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M -8,20 L -15,120 L 5,120 L 8,20 Z" fill="#000000"/>
    <path d="M 8,20 L 15,120 L -5,120 L -8,20 Z" fill="#000000"/>
  </g>
  
  <g transform="translate(600, 400)">
    <circle cx="0" cy="-150" r="30" fill="#000000"/>
    <rect x="-12" y="-120" width="24" height="100" fill="#000000" rx="12"/>
    <path d="M -12,-20 Q -60,-40 -100,-20" stroke="#000000" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M 12,-20 Q 60,-40 100,-20" stroke="#000000" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M -8,20 L -20,120 L 0,120 L 8,20 Z" fill="#000000"/>
    <path d="M 8,20 L 20,120 L 0,120 L -8,20 Z" fill="#000000"/>
  </g>
  
  <!-- Text elements -->
  <text x="200" y="700" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">MOVEMENT</text>
  <text x="600" y="700" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#000000" text-anchor="middle">PASSION</text>
</svg>
