<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="800" fill="#000000"/>
  
  <!-- White geometric shapes -->
  <rect x="50" y="50" width="200" height="200" fill="#FFFFFF" opacity="0.9"/>
  <rect x="550" y="50" width="200" height="200" fill="#FFFFFF" opacity="0.9"/>
  <rect x="50" y="550" width="200" height="200" fill="#FFFFFF" opacity="0.9"/>
  <rect x="550" y="550" width="200" height="200" fill="#FFFFFF" opacity="0.9"/>
  
  <!-- Red accent -->
  <rect x="300" y="300" width="200" height="200" fill="#DC2626"/>
  
  <!-- Dance movement lines -->
  <path d="M 150,150 Q 400,200 650,150" stroke="#DC2626" stroke-width="8" fill="none" opacity="0.7"/>
  <path d="M 150,650 Q 400,600 650,650" stroke="#DC2626" stroke-width="8" fill="none" opacity="0.7"/>
  <path d="M 150,150 Q 100,400 150,650" stroke="#DC2626" stroke-width="8" fill="none" opacity="0.7"/>
  <path d="M 650,150 Q 700,400 650,650" stroke="#DC2626" stroke-width="8" fill="none" opacity="0.7"/>
  
  <!-- Center text -->
  <text x="400" y="400" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">DANCE</text>
</svg>
